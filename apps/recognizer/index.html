<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lens Buddy · 렌즈 버디</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Nunito:wght@600;700;800&family=Noto+Sans+KR:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="blob c"></div>
  </div>

  <a class="home-link" href="../../index.html">← Jihye Apps</a>

  <main class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-icon">📷</span>
        <div>
          <p class="brand-name" id="brandName">Lens Buddy</p>
          <h1 id="appTitle">Nhận diện bằng camera / ảnh</h1>
        </div>
      </div>
      <p class="tagline" id="tagline">Mở camera hoặc tải ảnh — AI đoán dog / cat / snake / rabbit / elephant</p>
    </header>

    <div class="lang-switch" role="tablist" aria-label="Language">
      <button type="button" class="lang-btn active" data-lang="vi">🇻🇳 Tiếng Việt</button>
      <button type="button" class="lang-btn" data-lang="ko">🇰🇷 한국어</button>
    </div>

    <section class="stage">
      <div class="webcam-shell">
        <div id="webcam-container" class="webcam-container">
          <div class="webcam-placeholder" id="placeholder">
            <span class="placeholder-icon">🎥</span>
            <p id="placeholderText">Bấm “Camera” hoặc “Tải ảnh”</p>
          </div>
          <img id="uploadPreview" class="upload-preview" alt="" hidden>
        </div>
        <div class="scan-line" id="scanLine" hidden></div>
      </div>

      <div class="result-panel">
        <p class="result-label" id="resultLabel">Kết quả</p>
        <p class="result-name" id="resultName">—</p>
        <p class="result-confidence" id="resultConfidence"></p>
        <div class="bars" id="label-container"></div>
      </div>
    </section>

    <div class="actions">
      <button type="button" class="btn primary" id="startBtn">▶ Camera</button>
      <button type="button" class="btn mint" id="uploadBtn">🖼 Tải ảnh</button>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <button type="button" class="btn ghost" id="stopBtn" disabled>■ Dừng</button>
    </div>

    <p class="status" id="status" role="status"></p>

    <footer class="note">
      <p id="modelNote">Model: Teachable Machine · VLpAcbNB8</p>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
